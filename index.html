nd:#b88925}.green{background:#249b68}.purple{background:#7654d8}.shop-grid,.passive-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.shop-card h3{margin:0 0 6px}.shop-card p{margin:4px 0 10px;opacity:.85;min-height:48px}.hidden{display:none}.log{min-height:110px;max-height:160px;overflow:auto;line-height:1.45;white-space:pre-line}.popup{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-weight:900;font-size:24px;pointer-events:none;animation:popFloat .8s ease-out forwards;text-shadow:0 3px 8px #000}.popup.damage{color:#ff6b6b}.popup.poison{color:#b66bff}.popup.heal{color:#4cff88}.popup.mp{color:#6aa6ff}.rarity-Common{border-color:#8d96aa}.rarity-Rare{border-color:#4aa3ff;box-shadow:0 0 12px #4aa3ff44}.rarity-Epic{border-color:#b66bff;box-shadow:0 0 14px #b66bff55}.rarity-Legend{border-color:#ffd166;box-shadow:0 0 18px #ffd16666;background:linear-gradient(180deg,#2a2540,#181220)}@keyframes popFloat{0%{opacity:0;transform:translate(-50%,-20%) scale(.8)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-115%) scale(1)}}

</section>
<section class="log" id="log">迷宮行進曲、開幕。
深層へ進め。</section>

const passiveTypes={mpCost:{name:'省エネ詠唱',unit:'%',desc:v=>`魔法のMP消費-${v}%`},mpRegen:{name:'マナフロー',unit:'%',desc:v=>`毎ターンMP回復+${v}%`},maxMp:{name:'魔力増幅',unit:'',desc:v=>`最大MP+${v}`},burnTank:{name:'火傷耐久',unit:'%',desc:v=>`火傷中の敵から受けるダメージ-${v}%`},venomHeal:{name:'毒吸収',unit:'%',desc:v=>`毒状態の敵がいると毎ターン最大HP${v}%回復`},glassAtk:{name:'ガラスキャノン',unit:'',desc:v=>`攻撃力+${v} / 防御力-${Math.ceil(v/3)}`},guardPower:{name:'ガード職人',unit:'%',desc:v=>`ガード時の軽減率+${v}%`},burnBoost:{name:'燃焼強化',unit:'%',desc:v=>`火傷付与率+${v}%`},poisonBoost:{name:'毒刃強化',unit:'%',desc:v=>`毒付与率+${v}%`},lifestealBoost:{name:'吸血強化',unit:'%',desc:v=>`吸血武器の回復率+${v}%`},fastCast:{name:'詠唱省略',unit:'%',desc:v=>`詠唱なしでメテオ/ノヴァ発動。ただし威力-${v}%`},skillBoost:{name:'武技強化',unit:'%',desc:v=>`スキルダメージ+${v}%`},maxHpBoost:{name:'生命力強化',unit:'%',desc:v=>`最大HP+${v}%`},defBoost:{name:'防御強化',unit:'',desc:v=>`防御力+${v}`},regen:{name:'自然回復',unit:'%',desc:v=>`毎ターン最大HP${v}%回復`}};

let player,enemy,stage,gold,mode,gameMode,busy,bestStage,selectedCharacter='hero';let currentShop=[],passiveChoices=[],pendingAfterPassive='town',casting=null;
let isRateBattle=false,rateOpponent=null,adventureBackup=null;

// ===== 音楽・効果音（外部音源なし / WebAudio） =====
let audioCtx=null;
let soundEnabled=localStorage.getItem('miniRpgSound')!=='off';
let bgmTimer=null;
let bgmStep=0;
let masterGain=null;
let bgmGain=null;

function initAudio(){
  if(audioCtx)return;
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  audioCtx=new AC();
  masterGain=audioCtx.createGain();
  bgmGain=audioCtx.createGain();
  masterGain.gain.value=.35;
  bgmGain.gain.value=.16;
  bgmGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
}
function resumeAudio(){
  initAudio();
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}
function setSoundButton(){
  const b=document.getElementById('soundBtn');
  if(b)b.textContent=soundEnabled?'音 ON':'音 OFF';
}
function toggleSound(){
  soundEnabled=!soundEnabled;
  localStorage.setItem('miniRpgSound',soundEnabled?'on':'off');
  setSoundButton();
  if(soundEnabled){resumeAudio();startBgm();playSound('select');}
  else stopBgm();
}
function tone(freq,duration=.12,type='square',volume=.25,dest=null,when=0){
  if(!soundEnabled)return;
  resumeAudio();
  if(!audioCtx)return;
  const t=audioCtx.currentTime+when;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(volume,t+.01);
  gain.gain.exponentialRampToValueAtTime(.001,t+duration);
  osc.connect(gain);
  gain.connect(dest||masterGain);
  osc.start(t);
  osc.stop(t+duration+.03);
}
function noise(duration=.12,volume=.18,when=0){
  if(!soundEnabled)return;
  resumeAudio();
  if(!audioCtx)return;
  const t=audioCtx.currentTime+when;
  const buffer=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*duration),audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  const src=audioCtx.createBufferSource();
  const gain=audioCtx.createGain();
  src.buffer=buffer;
  gain.gain.setValueAtTime(volume,t);
  gain.gain.exponentialRampToValueAtTime(.001,t+duration);
  src.connect(gain);
  gain.connect(masterGain);
  src.start(t);
}
function playSound(name){
  if(!soundEnabled)return;
  if(name==='select'){tone(660,.06,'triangle',.18);tone(990,.08,'triangle',.13,null,.05);}
  if(name==='attack'){tone(180,.05,'sawtooth',.24);tone(95,.09,'square',.18,null,.04);noise(.08,.08,.02);}
  if(name==='hit'){tone(120,.08,'square',.22);noise(.10,.13);}
  if(name==='magic'){tone(440,.08,'sine',.18);tone(660,.10,'sine',.16,null,.07);tone(990,.13,'triangle',.14,null,.15);}
  if(name==='heal'){tone(523,.08,'sine',.16);tone(659,.08,'sine',.16,null,.08);tone(784,.14,'sine',.14,null,.16);}
  if(name==='guard'){tone(260,.06,'triangle',.12);tone(196,.10,'triangle',.12,null,.05);}
  if(name==='buy'){tone(784,.07,'square',.14);tone(1175,.10,'square',.12,null,.07);}
  if(name==='win'){tone(523,.10,'square',.16);tone(659,.10,'square',.16,null,.1);tone(784,.10,'square',.16,null,.2);tone(1046,.18,'square',.16,null,.3);}
  if(name==='lose'){tone(330,.16,'sawtooth',.18);tone(247,.18,'sawtooth',.16,null,.16);tone(165,.25,'sawtooth',.14,null,.34);}
}
function startBgm(){
  if(!soundEnabled)return;
  resumeAudio();
  if(!audioCtx||bgmTimer)return;
  const scale=[220,261.63,293.66,329.63,392,329.63,293.66,261.63,196,246.94,293.66,329.63,392,440,392,329.63];
  bgmTimer=setInterval(()=>{
    if(!soundEnabled||!audioCtx)return;
    const f=scale[bgmStep%scale.length];
    tone(f,.13,'square',.055,bgmGain);
    if(bgmStep%4===0)tone(f/2,.20,'triangle',.045,bgmGain);
    bgmStep++;
  },190);
}
function stopBgm(){if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}}
window.addEventListener('load',setSoundButton);
// ================================================
function getPlayerId(){let id=localStorage.getItem('miniRpgPlayerId');if(!id){id='player_'+Math.random().toString(36).slice(2);localStorage.setItem('miniRpgPlayerId',id);}return id;}
function getPlayerName(){let name=localStorage.getItem('miniRpgPlayerName');if(!name){name=prompt('ランキング名を入力してね')||'noname';localStorage.setItem('miniRpgPlayerName',name);}return name;}
function getRating(){return Number(localStorage.getItem('miniRpgRating')||1000);}
function setRating(r){localStorage.setItem('miniRpgRating',String(Math.floor(r)));}
function makeBuild(){recalcStats();return{id:getPlayerId(),name:getPlayerName(),character:selectedCharacter,stage,mode:'hard',rating:getRating(),level:player.level,maxHp:player.maxHp,hp:player.maxHp,atk:player.atk,def:player.def,maxMp:player.maxMp,mpRegen:player.mpRegen,weapon:player.weapon,armor:player.armor,spells:player.spells,passives:player.passives,gold,updatedAt:Date.now()};}
async function submitBuild(){if(!db)return writeLog('Firebase設定がまだ入ってない！ firebaseConfigを自分の値に置き換えてね。');const build=makeBuild();await db.collection('builds').doc(build.id).set(build,{merge:true});writeLog(`記録送信完了！ STAGE ${build.stage} / RATE ${build.rating}`);}
async function loadDepthRanking(){
  if(!db)return writeLog('Firebase設定がまだ入ってない！');
  const snap=await db.collection('builds').orderBy('stage','desc').limit(10).get();
  let text='🏆 最深度ランキング\n';
  let i=1;
  snap.forEach(doc=>{
    const d=doc.data();
    text += i+'. '+(d.name||'noname')+' / STAGE '+(d.stage||1)+' / '+(d.character||'hero')+' / RATE '+(d.rating||1000)+'\n';
    i++;
  });
  writeLog(text);
}
async function loadRateRanking(){
  if(!db)return writeLog('Firebase設定がまだ入ってない！');
  const snap=await db.collection('builds').orderBy('rating','desc').limit(10).get();
  let text='⚔️ レートランキング\n';
  let i=1;
  snap.forEach(doc=>{
    const d=doc.data();
    text += i+'. '+(d.name||'noname')+' / RATE '+(d.rating||1000)+' / STAGE '+(d.stage||1)+'\n';
    i++;
  });
  writeLog(text);
}
function calcElo(my,op,win){const expected=1/(1+Math.pow(10,(op-my)/400));return Math.floor(my+32*((win?1:0)-expected));}
function pvpDamage(raw,def){return Math.max(1,Math.floor(raw*(100/(100+def))));}
function simulateDuel(a,b){let A={...a,hp:a.maxHp},B={...b,hp:b.maxHp};let log=[];for(let turn=1;turn<=40;turn++){let ad=pvpDamage(Math.floor(A.atk*(0.85+Math.random()*0.3)),B.def);B.hp-=ad;log.push(`${turn}T ${A.name} → ${ad}`);if(B.hp<=0)return{win:true,log};let bd=pvpDamage(Math.floor(B.atk*(0.85+Math.random()*0.3)),A.def);A.hp-=bd;log.push(`${turn}T ${B.name} → ${bd}`);if(A.hp<=0)return{win:false,log};}return{win:A.hp>=B.hp,log};}
async function rateBattle(){
  if(!player)return writeLog('先にキャラを選んで冒険を開始してね！');
  if(!db)return writeLog('Firebase設定がまだ入ってない！');
  if(busy)return writeLog('行動中はレート戦を開始できない！');

  await submitBuild();
  const my=makeBuild();
  const low=my.rating-150, high=my.rating+150;
  let snap=await db.collection('builds').where('rating','>=',low).where('rating','<=',high).limit(20).get();
  let list=[];
  snap.forEach(doc=>{const d=doc.data();if(d.id!==my.id)list.push(d);});
  if(!list.length){
    snap=await db.collection('builds').limit(20).get();
    snap.forEach(doc=>{const d=doc.data();if(d.id!==my.id)list.push(d);});
  }
  if(!list.length)return writeLog('まだ対戦相手がいない！先に誰かのビルドが必要。');

  const opp=list[rand(0,list.length-1)];
  adventureBackup={
    enemy:JSON.parse(JSON.stringify(enemy)),
    gameMode,
    busy,
    casting:casting?JSON.parse(JSON.stringify(casting)):null,
    currentShop:JSON.parse(JSON.stringify(currentShop)),
    passiveChoices:JSON.parse(JSON.stringify(passiveChoices)),
    pendingAfterPassive
  };

  isRateBattle=true;
  rateOpponent=opp;
  casting=null;
  busy=false;
  gameMode='battle';
  enemy={
    name:'RIVAL: '+(opp.name||'noname'),
    icon:opp.character==='poison'?'☠️':opp.character==='mage'?'🔮':'⚔️',
    maxHp:Math.max(60,opp.maxHp||120),
    hp:Math.max(60,opp.maxHp||120),
    atk:Math.max(8,opp.atk||20),
    def:Math.max(0,opp.def||5),
    exp:0,
    gold:0,
    guard:false,
    boss:true,
    status:statusObj(),
    isRival:true
  };
  writeLog('レート戦開始！\nVS '+(opp.name||'noname')+' / RATE '+(opp.rating||1000)+'\n勝つとレート上昇、負けるとレート低下。');
  updateView();

function applyWeaponEffect(){const e=player.weapon.effect;if(!e)return;if(e==='poison'&&Math.random()<.45+passiveSum('poisonBoost')/100){enemy.status.poison=3;addLog('ポイズンダガーの効果！毒を付与した！');}if(e==='burn'&&Math.random()<.35+passiveSum('burnBoost')/100){enemy.status.burn=3;addLog('炎の剣の効果！火傷を付与した！');}if(e==='stun'&&Math.random()<.18){enemy.status.stun=1;addLog('プラズマブレードの効果！スタンさせた！');}if(e==='boss'&&enemy.boss){const d=damage(enemy,Math.floor(player.atk*.5));addLog(`ドラゴンキラー特効！追加${d}ダメージ！`);}if(e==='void'&&Math.random()<.35){enemy.status.poison=3;enemy.status.burn=3;if(Math.random()<.25)enemy.status.stun=1;addLog('ヴォイドエッジの効果！状態異常を付与した！');}}
function applyRegen(){const v=passiveSum('regen');if(v>0){const h=Math.max(2,Math.floor(player.maxHp*v/100));player.hp=Math.min(player.maxHp,player.hp+h);popupText('player','自然回復 +'+h,'heal');addLog(`自然回復でHP${h}回復！`);}}
function playerAction(type){resumeAudio();if(busy||gameMode!=='battle')return;busy=true;player.guard=false;writeLog('');applyStatusEffects(player,'プレイヤー');applyRegen();if(player.hp<=0){updateView();checkEnd();return;}if(player.status.stun>0){player.status.stun--;addLog('プレイヤーはスタンして動けない！');updateView();setTimeout(enemyTurn,650);return;}if(player.skillCd>0)player.skillCd--;if(player.magicCd>0)player.magicCd--;gainMp();if(type==='attack'){playSound('attack');if(casting){addLog('詠唱を中断して攻撃した！');casting=null;}animate('playerSprite','attack');let atk=player.status.burn>0?Math.floor(player.atk*.7):player.atk;const d=damage(enemy,rand(atk-4,atk+6));addLog(`攻撃！ ${d}ダメージ！`);applyWeaponEffect();applyLifeSteal();animate('enemyBox','shake');}if(type==='skill'){playSound('attack');if(casting){addLog('詠唱を中断してスキルを使った！');casting=null;}if(player.skillCd>0)addLog(`スキルはあと${player.skillCd}ターン使えない！`);else{player.skillCd=3;animate('playerSprite','attack');if(Math.random()<.22)addLog('スキル発動！ ……しかし外れた！');else{let atk=player.status.burn>0?Math.floor(player.atk*.7):player.atk;let base=rand(atk+12,atk+26);
base=Math.floor(base*(1+passiveSum('skillBoost')/100));
const d=damage(enemy,base);
addLog(`スキル発動！ ${d}ダメージ！${passiveSum('skillBoost')?` 武技強化+${passiveSum('skillBoost')}%`:''}`);animate('enemyBox','shake');}}}if(type==='magic'){playSound('magic');if(casting){addLog('すでに詠唱中！次のターンまで耐えろ！');updateView();busy=false;return;}if(!player.spells.length)addLog('まだ魔法を覚えていない！');else if(player.magicCd>0)addLog(`魔法はあと${player.magicCd}ターン使えない！`);else{const spell=player.spells[player.spells.length-1],cost=magicCost(spell);if(player.mp<cost){addLog(`MPが足りない！ 必要MP:${cost}`);updateView();busy=false;return;}player.mp-=cost;popupText('player','MP -'+cost,'mp');player.magicCd=2;const needsCast=(spell==='meteor'||spell==='nova')&&!hasPassive('fastCast');if(needsCast){casting={spell};addLog(`${spell.toUpperCase()}の詠唱を開始した……次の自分のターン開始時に発動！`);}else{animate('playerSprite','attack');const fast=(spell==='meteor'||spell==='nova')&&hasPassive('fastCast');const d=damage(enemy,spellDamage(spell,fast));addLog(`${spell.toUpperCase()}！ MP-${cost} / ${d}ダメージ！${fast?' 詠唱省略で威力低下':''}`);applySpellStatus(spell);animate('enemyBox','shake');}}}if(type==='heal'){playSound('heal');if(casting){addLog('詠唱を中断して回復した！');casting=null;}if(player.hiPotions>0&&player.hp<player.maxHp*.45){player.hiPotions--;const h=Math.floor(player.maxHp*.8);player.hp=Math.min(player.maxHp,player.hp+h);popupText('player','+'+h,'heal');addLog(`ハイポーション！ ${h}回復！`);}else if(player.potions>0&&player.hp<player.maxHp){player.potions--;const h=Math.floor(player.maxHp*.45);player.hp=Math.min(player.maxHp,player.hp+h);popupText('player','+'+h,'heal');addLog(`ポーション！ ${h}回復！`);}else addLog('回復できない！');}if(type==='guard'){playSound('guard');player.guard=true;addLog(casting?'詠唱しながらガードした！':'ガードした！');}
if(type!=='heal')applyVenomHeal();
updateView();if(checkEnd())return;setTimeout(enemyTurn,650);}
function enemyTurn(){applyStatusEffects(enemy,enemy.name);if(enemy.hp<=0){updateView();checkEnd();return;}enemy.guard=false;if(enemy.status.stun>0){enemy.status.stun--;addLog(`${enemy.name}はスタンして動けない！`);updateView();busy=false;return;}let raw,n=enemy.name;if(n.includes('Goblin')&&Math.random()<.35){raw=rand(enemy.atk-2,enemy.atk+4)*2;addLog(`${enemy.name}の連続攻撃！`);}else if(n.includes('Bot')&&Math.random()<.35){enemy.guard=true;addLog(`${enemy.name}は防御モードに入った！`);updateView();busy=false;return;}else if(n.includes('Serpent')&&Math.random()<.35){player.status.poison=4;raw=rand(enemy.atk-4,enemy.atk+4);addLog(`${enemy.name}の毒牙！毒を受けた！`);}else if((n.includes('Dragon')||enemy.boss)&&Math.random()<.32){player.status.burn=3;raw=rand(enemy.atk+16,enemy.atk+38);addLog(`${enemy.name}の火炎攻撃！火傷した！`);}else if(enemy.boss&&Math.random()<.28){raw=rand(enemy.atk+20,enemy.atk+45);addLog(`${enemy.name}の必殺攻撃！`);}else if(Math.random()<.68){raw=rand(enemy.atk-3,enemy.atk+5);}else if(Math.random()<.9){raw=rand(enemy.atk+6,enemy.atk+14);addLog(`${enemy.name}の強攻撃！`);}else{enemy.guard=true;addLog(`${enemy.name}は身構えた！`);updateView();busy=false;return;}if(enemy.status.burn>0)raw=Math.floor(raw*.7);if(passiveSum('burnTank')&&enemy.status.burn>0)raw=Math.floor(raw*(1-passiveSum('burnTank')/100));playSound('hit');animate('enemySprite','attack');const reduced=Math.floor(raw*(100/(100+player.def)));const d=damage(player,Math.max(1,reduced));addLog(`${enemy.name}の攻撃！ ${d}ダメージ！`);animate('playerBox','shake');updateView();if(checkEnd())return;if(casting){const spell=casting.spell;casting=null;animate('playerSprite','attack');playSound('magic');const d2=damage(enemy,spellDamage(spell,false));addLog(`詠唱完了！ ${spell.toUpperCase()}発動！ ${d2}ダメージ！`);applySpellStatus(spell);animate('enemyBox','shake');updateView();if(checkEnd())return;}busy=false;}


function toggleHelp(){writeLog(`目標: ステージ30のFINAL BOSS撃破！
5ステージごとに3つのパッシブから1つ選択。
防御は割合軽減。毒吸収は自分の行動後だけ発動。
パッシブは5/10/15/20%などレア度付き。
メテオ/ノヴァは詠唱魔法。詠唱省略パッシブで即発動できるが威力30%低下。
レベルアップではMP全回復しない。
ショップはポーション/ハイポーション固定＋ランダム3枠。
通常攻撃の状態異常は専用武器が必要。
街で武器強化ができる。`);}
